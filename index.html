<!DOCTYPE html>
<html>
<head>
  <title>Smart Receipt Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      width: 30%;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #0f172a;
    }

    canvas {
      margin-top: 20px;
    }

    input[type="file"] {
      width: auto;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>💰 Smart Receipt Tracker</h1>

  <div class="card">
    <div class="actions">
      <input id="merchant" placeholder="Merchant">
      <input id="amount" placeholder="Amount">

      <button onclick="addExpense()">Add</button>
      <button onclick="simulatePayment()">Auto Fill</button>
    </div>

    <br>

    <input type="file" onchange="scanReceipt(event)">
    <p id="ocrResult"></p>

    <button onclick="exportExcel()">📤 Export Excel</button>

    <div class="total">Total: ₹<span id="total">0</span></div>
  </div>

  <div class="card">
    <h3>📊 Analytics</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>🧾 Transactions</h3>

    <table>
      <thead>
        <tr>
          <th>Merchant</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
